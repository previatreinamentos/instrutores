<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Relatórios - Educação e Mobilidade</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #eef2f7; }
        .caixa-login { background: white; padding: 35px; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); text-align: center; width: 320px; }
        h2 { color: #1a73e8; margin-bottom: 20px; }
        input { padding: 12px; width: 100%; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        button { padding: 12px; width: 100%; background: #1a73e8; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        button:hover { background: #1557b0; }
        #area-relatorio { display: none; width: 100%; height: 100vh; position: fixed; top: 0; left: 0; background: white; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

<div id="login-container" class="caixa-login">
    <h2>Acesso ao Portal</h2>
    <input type="text" id="usuario" placeholder="Usuário (Ex: CPF)">
    <input type="password" id="senha" placeholder="Senha">
    <button onclick="entrar()">Entrar no Dashboard</button>
</div>

<div id="area-relatorio">
    <iframe id="meu-iframe" src=""></iframe>
</div>

<script>
    // --- CADASTRO DE USUÁRIOS E LINKS DO LOOKER STUDIO ---
    const dadosAcesso = {
        "instrutor01": {
            "senha": "123",
            "link": "https://datastudio.google.com/embed/reporting/5bd90104-bb6f-4cb6-921a-23dec39b944b/page/p_cwztlvuwpd"
        },
        "aluno_teste": {
            "senha": "456",
            "link": "COLE_AQUI_OUTRO_LINK_DO_LOOKER"
        }
    };

    function entrar() {
        const user = document.getElementById('usuario').value.toLowerCase();
        const pass = document.getElementById('senha').value;
        const iframe = document.getElementById('meu-iframe');
        const loginDiv = document.getElementById('login-container');
        const relatorioDiv = document.getElementById('area-relatorio');

        if (dadosAcesso[user] && dadosAcesso[user].senha === pass) {
            iframe.src = dadosAcesso[user].link;
            loginDiv.style.display = 'none';
            relatorioDiv.style.display = 'block';
        } else {
            alert("Usuário ou senha incorretos!");
        }
    }
</script>

</body>
</html>
